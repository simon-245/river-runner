<!DOCTYPE html>
<html>
<head>
    <title>Who Gets the Bed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        .game-section {
            flex-shrink: 0;
        }

        .image-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .image-section h2 {
            color: #333;
            font-size: 18px;
        }

        .image-section img {
            width: 100%;
            height: 600px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .image-section img {
                max-width: 400px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="game-section" id="game-container"></div>
    <div class="image-section">
        <img src="images/Icu Room.png" alt="Hospital Room">
    </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
